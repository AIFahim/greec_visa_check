name: Greek visa slot check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: visa-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-chromium-1.48.0

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Restore seen_state.json
        uses: actions/cache/restore@v4
        with:
          path: seen_state.json
          key: seen-state-${{ github.run_id }}
          restore-keys: |
            seen-state-

      - name: Run check
        env:
          SUPERSAAS_URL: https://www.supersaas.com/schedule/login/GreekEmbassyInDublin/Visas
          SUPERSAAS_EMAIL: ${{ secrets.SUPERSAAS_EMAIL }}
          SUPERSAAS_PASSWORD: ${{ secrets.SUPERSAAS_PASSWORD }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AUTO_BOOK: ${{ vars.AUTO_BOOK || 'false' }}
          AUTO_BOOK_CUTOFF_DATE: ${{ vars.AUTO_BOOK_CUTOFF_DATE }}
          HEADLESS: "true"
          DEBUG_DUMP: "false"
        run: python run_once.py

      - name: Save seen_state.json
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_state.json
          key: seen-state-${{ github.run_id }}

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: debug/
          if-no-files-found: ignore
          retention-days: 7
